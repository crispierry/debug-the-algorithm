name: Netlify QA Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy to QA
        required: false
        default: main

concurrency:
  group: netlify-qa
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install Netlify CLI
        run: npm install --global netlify-cli@24.3.0

      - name: Deploy QA build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: netlify deploy --no-build --dir=dist --alias=qa-preview --message "QA deploy ${GITHUB_SHA}"
